<!DOCTYPE html>
<html>
<head>
  <title>Juego Limon REPASO</title>
  <link rel="styleSheet" href="limones.css"/>
  <script src="utils.js"></script>
 
</head>
<body onload="iniciar()">
  <div class="contenedor">
    <h1>Atrapar Limones</h1>
    <p>Si del cielo te caen limones, haz limonada. </p>
    <h2>Autor: Cesar Amaguaña</h2>

    <canvas id="areaJuego" width="600" height="400"></canvas>

    <div class="panel">
      <p>Puntaje: <span id="txtPuntaje">0</span></p>
    </div>

    <div class="botones">
      <button onclick="moverIzquierda()">Izquierda</button>
      <button onclick="moverDerecha()">Derecha</button>
      <button onclick="bajarLimon()">Bajar limon</button>
      <button onclick="probarAleatorio()">PROBAR ALEATORIO</button>
      <button>Reiniciar</button>
    </div>
  </div>
  <script src="limones.js"></script>
</body>
</html>
